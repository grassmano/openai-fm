[Defaults]
# Specify the default voice to use if not provided via command line.
# Example: Default, Aurora, etc. (must match a name in voices.json)
voice = Default

# Specify the default vibe to use if not provided via command line.
# Example: Default Vibe, Cheerful, Sad, etc. (must match a key in vibes.json)
vibe = Default Vibe

[Player]
# Specify the command or path to your preferred media player for the --play option.
# Examples:
# media_player = vlc
# media_player = C:\Program Files\VideoLAN\VLC\vlc.exe
# media_player = /usr/bin/cvlc
# media_player = ffplay -autoexit -nodisp
# If left empty or the player is not found, the script will save the audio file instead.
media_player =
